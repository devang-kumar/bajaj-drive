<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchy Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>Hierarchy Analyzer</h1>
            <p>Analyze trees, cycles, duplicates and invalid entries</p>
        </div>

        <div class="input-card">
            <textarea
                id="nodes"
                placeholder="Enter edges separated by commas

Example:
A->B,A->C,B->D"
            ></textarea>

            <button id="submitBtn">
                Analyze Hierarchy
            </button>
        </div>

        <div id="error"></div>

        <div id="summaryCards"></div>

        <div id="hierarchies"></div>

        <div id="extraInfo"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
